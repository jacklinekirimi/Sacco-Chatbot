<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in | Amini Assist</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-6">

  <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 rounded-2xl shadow-xl overflow-hidden">

    <!-- Left card -->
    <div class="relative p-10
                bg-gradient-to-br from-blue-950 via-indigo-950 to-black text-white">

      <!-- Back home -->
      <a href="../index.html"
         class="absolute top-6 left-6 text-lg font-semibold text-slate-300 hover:text-white transition">
        ← Home
      </a>
    <div class="flex flex-col justify-center h-full">
<!-- Logo + App Name -->
<div class="flex items-center justify-center gap-3 mb-7">
  <!-- Logo -->
  <img
    src="../images/Untitled design (2).png"
    alt="AminiAssist Logo"
    class="w-8 h-8 rounded-lg "
  />

  <!-- App Name -->
  <span class="text-2xl font-semibold text-white">
    AminiAssist
  </span>
</div>

      
        <h1 class="text-4xl font-bold mb-4 text-center">
          Welcome Back!
        </h1>
        <p class="text-slate-300 text-lg text-center ">
        It's great to see you again.
        </p>
      </div>
    </div>

    <!-- Right card -->
    <div class="p-10 bg-white border-l border-slate-200">

      <h2 class="text-3xl font-bold mb-8 text-slate-800 text-center">
      Log in
      </h2>

      <form id="loginForm"  class="space-y-5">
        <input
          type="email"
          placeholder="Email"
          id="email"
          class="w-full px-4 py-3 rounded-lg border border-slate-300
                 focus:outline-none focus:ring-2 focus:ring-indigo-600"
        />

        <div class="relative">
        <input
          type="password"
          id="password"
          placeholder="Password"
          minlength="8" required
          class="w-full px-4 py-3 rounded-lg border border-slate-300
                 focus:outline-none focus:ring-2 focus:ring-indigo-600"
       
        />
      <img
  id="togglePassword"
  src="../images/icons/hide.png"
  class="w-5 h-5 absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer opacity-70 hover:opacity-100"
/>

       </div>

        <button
          type="submit"
          class="w-full py-3 rounded-lg bg-indigo-800 text-white
                 font-semibold hover:bg-indigo-600 transition">
          Log in
        </button>

      </form>

      <p class="text-sm text-slate-600 mt-6 text-center">
        Don't have an account?
        <a href="/auth/sign-up.html" class="text-indigo-700 hover:underline">
          Sign up
        </a>
      </p>

    </div>

  </div>
<script src="login.js"></script>

</body>


</html>
